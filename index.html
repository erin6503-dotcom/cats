<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幻之小貓 (Phantom Kitten)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            background-color: #111827;
            touch-action: manipulation;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* 完美 9:16 響應式手機外框 */
        .mobile-frame {
            width: 100%;
            height: 100%;
            position: relative;
            background-color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (min-aspect-ratio: 9/16) {
            .mobile-frame {
                height: 95vh;
                width: auto;
                aspect-ratio: 9 / 16;
                border-radius: 2rem;
                border: 8px solid #374151;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            }
        }

        /* 戶外場景繪圖 */
        .sky-bg {
            background: linear-gradient(to bottom, #a1c4fd 0%, #c2e9fb 100%);
        }
        
        .park-grass {
            background-color: #b5e61d;
            border-top: 6px solid #8cc63f;
            background-image: radial-gradient(#9ad62a 15%, transparent 16%), radial-gradient(#9ad62a 15%, transparent 16%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
        }

        .sidewalk {
            background-color: #e5e7eb;
            background-image: 
                linear-gradient(90deg, #d1d5db 2px, transparent 2px),
                linear-gradient(#d1d5db 2px, transparent 2px);
            background-size: 40px 40px;
            border-top: 8px solid #9ca3af;
            box-shadow: inset 0 10px 15px -5px rgba(0,0,0,0.1);
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
            animation: drift linear infinite;
        }
        @keyframes drift {
            from { transform: translateX(-100px); }
            to { transform: translateX(500px); }
        }

        .picnic-mat {
            width: 100px;
            height: 30px;
            background-color: #ffb6c1;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, #ff91a4 10px, #ff91a4 20px);
            border-radius: 50%;
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: -1;
        }

        .sakura {
            position: absolute;
            background-color: #ffc0cb;
            border-radius: 100% 0 100% 0;
            opacity: 0.8;
            animation: fall linear infinite;
            z-index: 15;
            pointer-events: none;
        }
        @keyframes fall {
            0% { transform: translate(0, -10px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translate(30px, 100vh) rotate(360deg); opacity: 0; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .modal-scale-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        .bird {
            position: absolute;
            font-size: 2rem;
            pointer-events: none;
            z-index: 10;
        }
        @keyframes flyRight {
            from { transform: translateX(-50px) translateY(0); }
            to { transform: translateX(110vw) translateY(-30px); }
        }

        /* 驚喜氣球動畫 */
        .bonus-balloon {
            position: absolute;
            z-index: 60;
            cursor: pointer;
            animation: floatUp 12s ease-in-out forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        @keyframes floatUp {
            0% { bottom: -15%; transform: translateX(0) rotate(-2deg); }
            33% { transform: translateX(15px) rotate(3deg); }
            66% { transform: translateX(-15px) rotate(-2deg); }
            100% { bottom: 110%; transform: translateX(0) rotate(0deg); }
        }

        /* 活動進度條縮減動畫 */
        @keyframes shrinkBar {
            from { width: 100%; }
            to { width: 0%; }
        }

        /* 搶金幣小遊戲動畫 */
        @keyframes fallDown {
            0% { top: -10%; opacity: 1; transform: rotate(0deg); }
            100% { top: 110%; opacity: 0.5; transform: rotate(360deg); }
        }
        .falling-coin {
            position: absolute;
            font-size: 3rem;
            cursor: pointer;
            z-index: 75;
            animation: fallDown 2.5s linear forwards;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        /* 數學打地鼠樣式 */
        .math-hole {
            background-color: #8b5a2b;
            border-bottom: 6px solid #5c3a18;
            border-radius: 1.5rem;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.4);
        }
        .math-cat { 
            position: absolute;
            width: 100%;
            height: 100%;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 8px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .math-cat.hide { transform: translateY(100%); }
        
        /* 廣播通知樣式 */
        @keyframes broadcastPop {
            0% { transform: scale(0.5); opacity: 0; }
            20% { transform: scale(1.1); opacity: 1; }
            80% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0; }
        }
        .broadcast-notice {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 95;
            pointer-events: none;
            animation: broadcastPop 3s ease-in-out forwards;
        }

        /* 浮動文字特效 */
        @keyframes floatUpFade {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-80px); opacity: 0; }
        }
        .floating-text {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            animation: floatUpFade 1.2s ease-out forwards;
            font-weight: 800;
            font-size: 1.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .cat-transition { transition: left 0.8s ease-in-out, bottom 0.8s ease-in-out; }
        
        .instruction-card { animation: slideUp 0.6s ease-out forwards; }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <div id="app" class="mobile-frame">
        
        <!-- 遊戲啟動說明畫面 -->
        <div id="intro-modal" class="absolute inset-0 bg-amber-50 z-[100] flex flex-col items-center justify-center p-6 text-center">
            <div class="instruction-card max-w-xs w-full">
                <div class="text-7xl mb-4 animate-float text-center w-full">🐈</div>
                <h1 class="text-4xl font-bold text-amber-900 mb-2">幻之小貓</h1>
                <p class="text-amber-700 font-medium mb-6">歡迎來到療癒的貓咪庭園</p>
                
                <div class="bg-white/80 rounded-2xl p-5 shadow-sm border border-amber-200 text-left space-y-3 mb-5">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">🥣</span>
                        <p class="text-sm text-gray-700"><b>餵食貓咪：</b>購買貓糧吸引稀有貓咪現身！</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">🎈</span>
                        <p class="text-sm text-gray-700"><b>驚喜氣球：</b>點選隨機飄升的泡泡氣球，玩遊戲賺金幣！</p>
                    </div>
                </div>
                
                <button onclick="startGame()" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-amber-200 transition transform active:scale-95 text-xl flex items-center justify-center gap-2">
                    進入庭園遊玩 🌸
                </button>
            </div>
        </div>

        <!-- 頂部資訊列 -->
        <header class="absolute top-0 w-full p-4 flex justify-between items-center z-20 pointer-events-none">
            <div class="bg-white/90 backdrop-blur-sm px-4 py-2 rounded-full shadow font-bold text-gray-700 flex items-center gap-2 pointer-events-auto border-2 border-amber-100">
                🪙 <span id="coin-display">100</span>
            </div>
            <div class="flex gap-2 pointer-events-auto">
                <button id="audio-btn" onclick="AudioEngine.toggleMute()" class="bg-pink-100/90 backdrop-blur-sm text-pink-800 w-10 h-10 rounded-full shadow font-bold flex items-center justify-center text-lg hover:scale-105 transition">🎵</button>
                <button onclick="toggleDex()" class="bg-amber-100/90 backdrop-blur-sm text-amber-800 px-4 py-2 rounded-full shadow font-bold border border-amber-200 hover:scale-105 transition">📖 圖鑑</button>
            </div>
        </header>

        <!-- 遊戲場景 -->
        <main class="flex-1 relative sky-bg flex flex-col overflow-hidden">
            <!-- 廣播區域 -->
            <div id="broadcast-area" class="absolute inset-0 pointer-events-none"></div>

            <!-- 雲朵 -->
            <div class="cloud w-20 h-8 top-14 left-4" style="animation-duration: 40s;"></div>
            <div class="cloud w-24 h-10 top-22 left-40" style="animation-duration: 55s; animation-delay: -20s;"></div>
            
            <!-- 遠處的樹木 -->
            <div class="h-1/4 w-full park-grass mt-auto relative z-10 flex items-end justify-around pb-2">
                <div class="text-6xl absolute -top-8 left-2">🌳</div>
                <div class="text-5xl absolute -top-5 left-[28%]">🌲</div>
                <div class="text-5xl absolute -top-4 right-[28%]">🌵</div>
                <div class="text-7xl absolute -top-10 right-2">🌳</div>
                <div class="text-3xl z-20 absolute bottom-2 left-12 animate-pulse">🌻</div>
                <div class="text-4xl z-20 absolute bottom-1 left-1/2 transform -translate-x-1/2">🪵</div>
                <div class="text-4xl z-20 absolute bottom-0 right-12">🌺</div>
            </div>
            
            <!-- 人行道 -->
            <div class="h-1/3 w-full sidewalk relative flex justify-center">
                <div id="cat-mover" class="absolute bottom-10 hidden z-10 w-full h-32 pointer-events-none">
                    <div id="cat-wrapper" class="absolute bottom-0 cat-transition pointer-events-auto">
                        <div class="cursor-pointer flex flex-col items-center" onclick="interactWithCat()">
                            <div id="cat-tooltip" class="absolute -top-6 text-lg font-bold text-blue-600 bg-white/90 border-2 border-blue-200 px-3 py-1 rounded-full animate-bounce">💦抓我呀</div>
                            <div id="cat-emoji" class="text-8xl animate-float">🐱</div>
                            <div class="picnic-mat scale-75"></div>
                        </div>
                    </div>
                </div>

                <div id="bowl-area" class="absolute bottom-10 cursor-pointer" onclick="handleBowlClick()">
                    <div id="bowl-empty" class="w-28 h-14 bg-amber-50 rounded-full border-4 border-amber-600 shadow-lg flex items-center justify-center hover:scale-105 transition">
                        <span class="text-base font-bold text-amber-700 opacity-80">放食物</span>
                    </div>
                    <div id="bowl-filled" class="hidden relative">
                        <div class="w-28 h-14 bg-amber-50 rounded-full border-4 border-amber-600 shadow-lg"></div>
                        <div id="food-emoji" class="absolute -top-6 left-1/2 transform -translate-x-1/2 text-5xl animate-bounce">🍙</div>
                        <div class="absolute -bottom-4 w-full h-2 bg-gray-300 rounded-full overflow-hidden">
                            <div id="progress-bar" class="h-full bg-green-500 w-0 transition-all duration-1000 ease-linear"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 雜貨鋪 Modal -->
        <div id="shop-modal" class="absolute inset-0 bg-black/50 z-30 hidden flex-col justify-end backdrop-blur-sm transition-opacity">
            <div class="bg-white w-full rounded-t-3xl p-6 shadow-2xl transform translate-y-full transition-transform" id="shop-content">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-bold text-gray-800">雜貨鋪</h2>
                    <button onclick="closeShop()" class="text-gray-500 bg-gray-100 rounded-full w-8 h-8 flex justify-center items-center hover:bg-gray-200">✕</button>
                </div>
                <div id="welfare-btn" class="hidden mb-4 bg-yellow-50 border-2 border-yellow-300 text-yellow-800 rounded-xl p-3 text-center cursor-pointer animate-bounce shadow-sm" onclick="startCoinMinigame()">
                    <div class="font-bold text-lg">💰 救濟搶錢挑戰</div>
                    <div class="text-sm text-amber-700">沒錢買貓糧了？點擊開始挑戰賺錢！</div>
                </div>
                <div class="grid grid-cols-3 gap-3" id="shop-items"></div>
            </div>
        </div>

        <!-- 圖鑑 Modal -->
        <div id="dex-modal" class="absolute inset-0 bg-amber-50 z-40 hidden flex-col modal-scale-in">
            <div class="p-4 bg-amber-100 flex justify-between items-center shadow-sm">
                <h2 class="text-2xl font-bold text-amber-900">幻之貓圖鑑</h2>
                <button onclick="toggleDex()" class="text-amber-800 font-bold text-xl px-2">✕</button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 no-scrollbar">
                <div class="grid grid-cols-3 gap-2" id="dex-grid"></div>
            </div>
        </div>

        <!-- 優化版：搶金幣小遊戲 Modal -->
        <div id="coin-minigame-modal" class="absolute inset-0 bg-gradient-to-b from-indigo-900 to-purple-900 z-[85] hidden flex-col overflow-hidden select-none backdrop-blur-md">
            <div class="flex justify-between items-center p-6 text-white font-bold text-2xl z-10">
                <div class="bg-black/30 px-4 py-1.5 rounded-full shadow-inner border border-indigo-500">⏳ <span id="cm-timer">10</span>s</div>
                <div class="bg-black/30 px-4 py-1.5 rounded-full shadow-inner border border-yellow-500 text-yellow-400">🪙 <span id="cm-score">0</span></div>
            </div>
            <!-- 背景裝飾 -->
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-20">
                <div class="text-[15rem] animate-pulse">💰</div>
            </div>
            <div id="cm-area" class="flex-1 relative z-10"></div>
            <div class="p-6 text-center text-yellow-300 text-lg font-bold animate-pulse bg-black/40 backdrop-blur-sm z-10 border-t border-purple-700">快速點擊落下的金幣！ 1 個 = 1 元</div>
        </div>

        <!-- 優化版：數學打地鼠 Modal -->
        <div id="math-minigame-modal" class="absolute inset-0 bg-emerald-900/95 z-[85] hidden flex-col overflow-hidden select-none backdrop-blur-sm">
            <div class="flex justify-between items-center p-4 text-white font-bold text-xl z-10">
                <div class="bg-black/30 px-4 py-1 rounded-full shadow-inner border border-emerald-500">⏳ <span id="math-timer">30</span>s</div>
                <div class="bg-black/30 px-4 py-1 rounded-full shadow-inner border border-yellow-500 text-yellow-400">🎯 <span id="math-score">0</span></div>
            </div>
            
            <!-- 黑板風格的題板 (縮小間隔與字體，避免跑版) -->
            <div class="mx-6 p-4 rounded-3xl text-center shadow-xl z-10 border-4 border-gray-700 bg-gray-800 relative modal-scale-in mt-1 mb-2">
                <div class="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-green-500 text-white text-xs px-3 py-1 rounded-full font-bold shadow border border-green-400 whitespace-nowrap">數學學院挑戰</div>
                <h2 id="math-question" class="text-4xl font-extrabold text-white tracking-widest drop-shadow-md font-mono">? + ? =</h2>
            </div>
            
            <!-- 將網格改為 3x2 (3欄2列)，大幅減少垂直空間佔用 -->
            <div class="flex-1 px-4 flex items-center justify-center z-10">
                <div class="grid grid-cols-3 gap-x-4 gap-y-6 w-full max-w-sm" id="math-grid">
                    <div class="math-hole h-20"></div>
                    <div class="math-hole h-20"></div>
                    <div class="math-hole h-20"></div>
                    <div class="math-hole h-20"></div>
                    <div class="math-hole h-20"></div>
                    <div class="math-hole h-20"></div>
                </div>
            </div>
            <div class="p-3 text-center text-white font-bold bg-black/50 text-base z-10 border-t border-emerald-800">💰 目前資產: 🪙 <span id="math-wallet">0</span></div>
        </div>

        <!-- 結算 Modal -->
        <div id="summary-modal" class="absolute inset-0 bg-black/70 z-[90] hidden flex justify-center items-center p-4 backdrop-blur-sm">
            <div class="bg-white rounded-3xl p-8 w-full max-w-sm text-center border-4 border-amber-400 animate-pop shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-amber-300 to-amber-500"></div>
                <h2 id="summary-title" class="text-2xl font-bold mb-4 text-amber-900">遊戲結束</h2>
                <div id="summary-content" class="mb-6 text-gray-700 font-medium text-lg"></div>
                <button id="summary-close" class="w-full bg-amber-500 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition hover:bg-amber-600">太棒了！</button>
            </div>
        </div>

        <!-- 對話 Modal (改用 normal flow 負 margin，徹底解決各種手機 OS 的跑版問題) -->
        <div id="dialogue-modal" class="absolute inset-0 bg-black/60 z-50 hidden flex-col justify-center items-center p-4 backdrop-blur-sm">
            <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl text-center relative animate-pop mt-12">
                <!-- 將圖示放回正常排版流中，透過 -mt-20 往上提，確保它能撐開空間不擋字 -->
                <div class="-mt-20 mb-2 flex justify-center">
                    <div id="dialogue-cat-icon" class="text-7xl drop-shadow-md leading-none">🐱</div>
                </div>
                <h3 id="dialogue-cat-name" class="font-bold text-2xl text-amber-800 mb-3">貓咪名字</h3>
                <div class="bg-blue-50 border border-blue-100 rounded-xl p-4 mb-4">
                    <div class="flex justify-center items-center gap-3 mb-2">
                        <p id="english-quote" class="text-xl font-bold text-gray-800">"Hello!"</p>
                        <button onclick="playPronunciation()" class="w-10 h-10 bg-blue-200 rounded-full flex items-center justify-center shadow-sm hover:bg-blue-300 transition hover:scale-105">🔊</button>
                    </div>
                    <p id="chinese-translation" class="text-sm text-gray-600 font-medium">你好！</p>
                </div>
                <div id="reward-container" class="text-lg text-amber-600 font-bold mb-4 bg-amber-50 p-2 rounded-lg border border-amber-100"></div>
                <button onclick="collectReward()" class="w-full bg-amber-500 text-white font-bold py-3 rounded-xl shadow-md active:scale-95 transition hover:bg-amber-600">收下禮物並道別 👋</button>
            </div>
        </div>

        <!-- 新圖鑑解鎖 Modal -->
        <div id="new-cat-modal" class="absolute inset-0 bg-black/80 z-[60] hidden flex-col justify-center items-center p-4 backdrop-blur-sm overflow-y-auto">
            <div class="bg-gradient-to-br from-amber-100 to-amber-300 rounded-3xl w-full max-w-sm p-6 shadow-2xl text-center relative border-4 border-white animate-pop flex flex-col items-center my-auto">
                <div class="bg-red-500 text-white font-bold px-6 py-2 rounded-full shadow-md border-2 border-white whitespace-nowrap mb-4">✨ 新圖鑑解鎖 ✨</div>
                <div class="bg-white rounded-2xl w-full p-6 mb-6 border-2 border-amber-200 shadow-inner">
                    <div id="new-cat-icon" class="text-8xl mb-2 drop-shadow-lg leading-none">🐱</div>
                    <h3 id="new-cat-name" class="font-bold text-3xl text-amber-900 mt-4">貓咪名字</h3>
                    <p class="text-sm text-amber-700 mt-2 font-bold italic">已正式登錄至幻之貓圖鑑！</p>
                </div>
                <button onclick="continueToDialogue()" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition text-lg">
                    查看謝禮 🎁
                </button>
            </div>
        </div>

    </div>

    <script>
        // --- 核心貓咪數據 (15 隻) ---
        const CATS = [
            { id: 'c1', name: '流浪橘橘', emoji: '🐈', reqFood: ['f1', 'f2'], rarity: 1, minReward: 15, maxReward: 25, dialogues: [{en: "Hello! I'm so hungry.", zh: "你好！我真的好餓喔。"}, {en: "Got more food?", zh: "還有更多食物嗎？"}, {en: "Yummy!", zh: "真好吃！"}, {en: "I love eating.", zh: "我最喜歡吃東西了。"}, {en: "Thanks for the meal.", zh: "謝謝你的招待。"}] },
            { id: 'c2', name: '害羞三花', emoji: '🐾', reqFood: ['f1', 'f2', 'f3'], rarity: 1, minReward: 20, maxReward: 40, dialogues: [{en: "It's a nice day.", zh: "今天是個好日子。"}, {en: "You're kind.", zh: "你真溫柔。"}, {en: "Don't look at me.", zh: "不要一直盯著我看啦。"}, {en: "I'm a bit shy.", zh: "我有一點害羞。"}, {en: "Purr...", zh: "呼嚕呼嚕..."}] },

        const FOODS = [
            { id: 'f1', name: '街邊乾糧', emoji: '🥣', cost: 10, timeSec: 1 },

            { id: 'f6', name: '特級貓薄荷', emoji: '🌿', cost: 250, timeSec: 6 }
        ];

        let state = { coins: 100, placedFood: null, currentCat: null, discoveredCats: [], isCatPresent: false, tempReward: 0 };
        let mathState = { active: false, currentAnswer: 0, timer: null, score: 0, timeLeft: 30 };
        let coinState = { active: false, timer: null, score: 0, timeLeft: 10, spawner: null };
        let gameStarted = false;

        // --- 音樂引擎 ---
        const AudioEngine = {
            ctx: null, isMuted: false, bgmTimer: null, bgmTick: 0,
            bass: [130.81, 174.61, 196.00], chords: [[261.63, 329.63, 392.0], [261.63, 349.23, 440.0], [293.66, 392.0, 493.88]],
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if(this.ctx.state === 'suspended') this.ctx.resume(); },
            toggleMute() { 
                this.isMuted = !this.isMuted; 
                this.init();
                if (!this.isMuted) this.startBGM(); else this.stopBGM();
                document.getElementById('audio-btn').innerText = this.isMuted ? '🔇' : '🎵';
            },
            play(type) {
                if (this.isMuted || !this.ctx) return;
                const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
                o.connect(g); g.connect(this.ctx.destination);
                const now = this.ctx.currentTime;
                if (type === 'coin') { o.frequency.value = 1200; g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.3); }
                else if (type === 'meow') { o.frequency.value = 600; o.frequency.exponentialRampToValueAtTime(800, now + 0.2); g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.4); }
                else if (type === 'click') { o.frequency.value = 400; g.gain.setValueAtTime(0.1, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.1); }
                else if (type === 'wrong') { o.frequency.value = 150; g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.3); }
                o.start(); o.stop(now + 0.5);
            },
            startBGM() {
                if(this.bgmTimer) clearInterval(this.bgmTimer);
                this.bgmTimer = setInterval(() => {
                    const now = this.ctx.currentTime;
                    const chordIdx = Math.floor(Math.random() * 3);
                    const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
                    o.connect(g); g.connect(this.ctx.destination);
                    if (this.bgmTick === 0) {
                        o.type = 'triangle'; o.frequency.value = this.bass[chordIdx];
                        g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.01, now + 1.2);
                    } else {
                        o.type = 'sine'; o.frequency.value = this.chords[chordIdx][Math.floor(Math.random()*3)];
                        g.gain.setValueAtTime(0.1, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    }
                    o.start(); o.stop(now + 1.2);
                    this.bgmTick = (this.bgmTick + 1) % 3;
                }, 450);
            },
            stopBGM() { if(this.bgmTimer) { clearInterval(this.bgmTimer); this.bgmTimer = null; } }
        };

        // --- 輔助功能：廣播提醒 ---
        function showBroadcast(text, bgColor = 'bg-amber-500') {
            const area = document.getElementById('broadcast-area');
            const notice = document.createElement('div');
            notice.className = `broadcast-notice px-8 py-4 rounded-full text-white font-bold text-xl shadow-2xl border-4 border-white whitespace-nowrap ${bgColor}`;
            notice.innerText = text;
            area.appendChild(notice);
            setTimeout(() => notice.remove(), 3000);
        }

        function showFloatingText(x, y, text, color) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = text;
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            el.style.color = color;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1200);
        }

        function updateCoinsUI() { 
            const ds = ['coin-display', 'math-wallet'];
            ds.forEach(id => { if(document.getElementById(id)) document.getElementById(id).innerText = Math.floor(state.coins); });
        }

        // --- 核心流程 ---
        function startGame() {
            AudioEngine.init(); AudioEngine.startBGM();
            document.getElementById('intro-modal').style.display = 'none';
            gameStarted = true;
            startAllSpawners();
            startSakura(); startBirds();
            updateCoinsUI();
        }

        // --- 驚喜氣球 (小遊戲觸發) ---
        function startAllSpawners() {
            function scheduleNextBalloon() {
                // 至少 2 分鐘 (120000 毫秒)，加上隨機 0~2 分鐘的等待時間 (總計約 2~4 分鐘出現一次)
                const delay = 120000 + Math.random() * 120000;
                
                setTimeout(() => {
                    // 如果遊戲沒開始、正在玩小遊戲、或是畫面上已經有氣球了，就只排程下一次而不產生新氣球
                    if (gameStarted && !mathState.active && !coinState.active && !document.querySelector('.bonus-balloon')) {
                        let rand = Math.random();
                        if (rand > 0.5) {
                            spawnBalloon('🎓', '數學挑戰！', 'bg-green-500', startMath);
                        } else {
                            spawnBalloon('🪙', '搶錢大賽！', 'bg-yellow-500', startCoinMinigame);
                        }
                    }
                    // 排程下一顆氣球
                    scheduleNextBalloon();
                }, delay);
            }
            
            // 啟動排程循環
            scheduleNextBalloon();
        }

        function spawnBalloon(emoji, msg, color, callback) {
            AudioEngine.play('meow');
            showBroadcast(msg, color);
            
            const b = document.createElement('div');
            b.className = 'bonus-balloon hover:scale-110 transition-transform';
            b.innerHTML = `
                <div class="bg-white/90 text-[11px] px-3 py-1 rounded-full mb-1 border-2 border-amber-300 font-black shadow-md text-gray-800 animate-bounce">點我!</div>
                <div class="relative flex justify-center items-center w-20 h-20 bg-white/40 backdrop-blur-md rounded-full border-2 border-white/60 shadow-[0_8px_32px_rgba(0,0,0,0.1)]">
                    <div class="text-5xl drop-shadow-lg">${emoji}</div>
                </div>
            `;
            // 固定在畫面正中央水平位置 (寬度約 80px，所以往左偏移 40px 置中)
            b.style.left = '50%';
            b.style.marginLeft = '-40px';
            
            b.onclick = (e) => { 
                e.stopPropagation(); 
                AudioEngine.play('click'); 
                b.remove(); 
                callback(); 
            };
            
            document.querySelector('main').appendChild(b);
            
            // 12秒後氣球飄出畫面外時自動移除
            setTimeout(() => { if(b.parentNode) b.remove(); }, 12000);
        }

        // --- 數學打地鼠 ---
        function startMath() {
            mathState.active = true; mathState.score = 0; mathState.timeLeft = 30;
            document.getElementById('math-score').innerText = '0';
            const modal = document.getElementById('math-minigame-modal');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            
            mathState.timer = setInterval(() => {
                mathState.timeLeft--;
                document.getElementById('math-timer').innerText = mathState.timeLeft;
                if (mathState.timeLeft <= 0) endMath();
            }, 1000);
            nextMathQuestion();
        }

        function nextMathQuestion() {
            const holes = document.querySelectorAll('.math-hole');
            holes.forEach(h => h.innerHTML = '');
            setTimeout(() => {
                if(!mathState.active) return;
                const a = Math.floor(Math.random()*10)+1; const b = Math.floor(Math.random()*10)+1;
                mathState.currentAnswer = a + b;
                document.getElementById('math-question').innerText = `${a} + ${b} = ?`;
                let opts = [a+b];
                while(opts.length < 6) { let f = Math.floor(Math.random()*19)+2; if(!opts.includes(f)) opts.push(f); }
                opts.sort(() => Math.random()-0.5);
                holes.forEach((hole, idx) => {
                    const cat = document.createElement('div');
                    cat.className = 'math-cat hide cursor-pointer hover:scale-105 transition-transform';
                    // 為了適應 3 欄版面，稍微調小地鼠貓咪身上數字標籤的大小 (-mt-1, text-lg)
                    cat.innerHTML = `<div class="text-[2.5rem] drop-shadow-md leading-none">🐈</div><div class="bg-white px-3 py-0.5 rounded-full font-bold text-lg shadow-md border-2 border-amber-400 -mt-1 z-10 text-gray-800 leading-tight">${opts[idx]}</div>`;
                    cat.onclick = (e) => {
                        if (opts[idx] === mathState.currentAnswer) {
                            mathState.score++; state.coins++; document.getElementById('math-score').innerText = mathState.score;
                            AudioEngine.play('coin'); showFloatingText(e.clientX, e.clientY, '✨ +1 🪙', '#4ade80');
                            nextMathQuestion();
                        } else {
                            state.coins = Math.max(0, state.coins - 1); AudioEngine.play('wrong');
                            showFloatingText(e.clientX, e.clientY, '💦 答錯 -1', '#ef4444');
                            cat.classList.add('hide');
                        }
                        updateCoinsUI();
                    };
                    hole.appendChild(cat);
                    setTimeout(() => cat.classList.remove('hide'), 50);
                });
            }, 400);
        }

        function endMath() {
            clearInterval(mathState.timer); mathState.active = false;
            document.getElementById('math-minigame-modal').classList.add('hidden');
            document.getElementById('math-minigame-modal').classList.remove('flex');
            showSummary("學院下課囉！", `你答對了 ${mathState.score} 題！總共獲得了相應的金幣報酬。`);
        }

        function renderShop() {
            const list = document.getElementById('shop-items'); list.innerHTML = '';
            FOODS.forEach(f => {
                const btn = document.createElement('div');

            document.getElementById('welfare-btn').classList.toggle('hidden', state.coins >= 10);

        function buyFood(f) {
            AudioEngine.play('click'); state.coins -= f.cost; state.placedFood = f; updateCoinsUI(); closeShop();
            document.getElementById('bowl-empty').classList.add('hidden');
            document.getElementById('bowl-filled').classList.remove('hidden');

                prg += 5; bar.style.width = prg + '%';
                if (prg >= 100) { clearInterval(timer); spawnCat(); }

        function spawnCat() {
            const possible = CATS.filter(c => c.reqFood.includes(state.placedFood.id));
            state.currentCat = possible[Math.floor(Math.random() * possible.length)];
            state.isCatPresent = true; state.placedFood = null;
            document.getElementById('bowl-filled').classList.add('hidden');
            document.getElementById('cat-emoji').innerText = state.currentCat.emoji;
            document.getElementById('cat-mover').classList.remove('hidden');
            AudioEngine.play('meow');

            }, 1000);

        function interactWithCat() {
            if (!state.currentCat) return;
            clearInterval(state.moveInterval); AudioEngine.play('click');
            
            // 隨機抽選 5 句對話中的其中 1 句
            const dialogues = state.currentCat.dialogues;
            const q = dialogues[Math.floor(Math.random() * dialogues.length)];
            
            document.getElementById('english-quote').innerText = `"${q.en}"`;
            document.getElementById('chinese-translation').innerText = q.zh;
            
            // 加入 30% 機率貓咪沒吃飽，不會留下金幣
            const isFull = Math.random() > 0.3;
            const rewardContainer = document.getElementById('reward-container');
            
            if (isFull) {
                state.tempReward = Math.floor(Math.random() * (state.currentCat.maxReward - state.currentCat.minReward + 1)) + state.currentCat.minReward;
                rewardContainer.innerText = `留下了 🪙 ${state.tempReward} 謝禮！`;
                rewardContainer.className = "text-lg text-amber-600 font-bold mb-4 bg-amber-50 p-2 rounded-lg border border-amber-100";
            } else {
                state.tempReward = 0;
                rewardContainer.innerText = `貓咪好像沒吃飽，這次沒有留下金幣 💦`;
                rewardContainer.className = "text-lg text-gray-500 font-bold mb-4 bg-gray-50 p-2 rounded-lg border border-gray-200";
            }
            
            const isNew = !state.discoveredCats.includes(state.currentCat.id);
            if (isNew) {
                state.discoveredCats.push(state.currentCat.id);
                document.getElementById('new-cat-name').innerText = state.currentCat.name;
                document.getElementById('new-cat-icon').innerText = state.currentCat.emoji;
                document.getElementById('new-cat-modal').classList.remove('hidden');
                document.getElementById('new-cat-modal').classList.add('flex');
                AudioEngine.play('coin');
            } else { showDialogueModal(); }
        }

        function continueToDialogue() {
            document.getElementById('new-cat-modal').classList.add('hidden');
            document.getElementById('new-cat-modal').classList.remove('flex');
            showDialogueModal();
        }

        function showDialogueModal() {
            document.getElementById('dialogue-cat-icon').innerText = state.currentCat.emoji;
            document.getElementById('dialogue-cat-name').innerText = state.currentCat.name;
            document.getElementById('dialogue-modal').classList.remove('hidden');
            document.getElementById('dialogue-modal').classList.add('flex');
        }

        function collectReward() {
            state.coins += state.tempReward; updateCoinsUI();
            document.getElementById('dialogue-modal').classList.add('hidden');
            document.getElementById('dialogue-modal').classList.remove('flex');
            document.getElementById('cat-mover').classList.add('hidden');
            document.getElementById('bowl-empty').classList.remove('hidden');
            state.isCatPresent = false; state.currentCat = null;
            AudioEngine.play('coin');
        }

        function toggleDex() {
            const d = document.getElementById('dex-modal');
            if (d.classList.contains('hidden')) { renderDex(); d.classList.remove('hidden'); d.classList.add('flex'); AudioEngine.play('click'); }
            else { d.classList.add('hidden'); d.classList.remove('flex'); AudioEngine.play('click'); }
        }

        function renderDex() {
            const grid = document.getElementById('dex-grid'); grid.innerHTML = '';
            CATS.forEach(c => {
                const disc = state.discoveredCats.includes(c.id);
                const card = document.createElement('div');
                card.className = `bg-white rounded-xl p-2 flex flex-col items-center shadow-sm border ${disc ? 'border-amber-200' : 'border-gray-200 opacity-60'}`;
                card.innerHTML = `<div class="text-3xl mb-1 ${disc ? '' : 'grayscale opacity-30'}">${disc ? c.emoji : '？'}</div><div class="font-bold text-gray-800 text-[10px] truncate w-full text-center leading-tight">${disc ? c.name : '未知'}</div><div class="text-[8px] text-amber-500 mt-0.5">${disc ? '★'.repeat(c.rarity) : ''}</div>`;
                grid.appendChild(card);
            });
        }

        function showSummary(title, content) {
            document.getElementById('summary-title').innerText = title;
            document.getElementById('summary-content').innerText = content;
            const modal = document.getElementById('summary-modal');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            document.getElementById('summary-close').onclick = () => { modal.classList.add('hidden'); modal.classList.remove('flex'); AudioEngine.play('click'); };
        }

        function playPronunciation() {
            if (!state.currentCat) return;
            const text = state.currentCat.dialogues[0].en;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US'; u.rate = 0.8; window.speechSynthesis.speak(u);
        }

        function startSakura() {
            setInterval(() => {
                if(!gameStarted) return;
                const s = document.createElement('div'); s.className = 'sakura';
                s.style.left = Math.random() * 100 + '%';
                s.style.width = s.style.height = (Math.random()*8+5) + 'px';
                s.style.animationDuration = (Math.random()*3+5) + 's';
                document.getElementById('app').appendChild(s);
                setTimeout(() => s.remove(), 8000);
            }, 1500);
        }

        function startBirds() {
            setInterval(() => {
                if(!gameStarted) return;
                const bird = document.createElement('div'); bird.className = 'bird'; bird.innerText = '🐦';
                bird.style.top = (Math.random() * 15 + 15) + '%';
                bird.style.left = '-20px';
                bird.style.animation = 'flyRight 8s linear forwards';
                document.querySelector('main').appendChild(bird);
                setTimeout(() => bird.remove(), 9000);
            }, 7000);
        }

        window.onload = () => { updateCoinsUI(); };
    </script>
</body>
</html>
